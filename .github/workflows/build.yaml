name: Build add-on

on:
  push:
    branches: [main]
    paths:
      - 'esphome-enhanced-dashboard/**'
      - '.github/workflows/build.yaml'
  pull_request:
    paths:
      - 'esphome-enhanced-dashboard/**'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get add-on metadata
        id: meta
        run: |
          echo "version=$(yq .version esphome-enhanced-dashboard/config.yaml)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --${{ matrix.arch }}
            --target esphome-enhanced-dashboard
            --image ghcr.io/heffneil/{arch}-esphome-enhanced-dashboard
            --docker-hub ghcr.io
            ${{ github.event_name != 'pull_request' && '--no-latest --push' || '--test' }}
