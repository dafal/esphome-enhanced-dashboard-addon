name: ESPHome Enhanced Dashboard Dev
panel_title: ESPHome Enhanced Dev
description: Dev/test fork of ESPHome Enhanced Dashboard with search, tags, archive, side panel, batch actions
version: 0.2.16-test3
slug: esphome_enhanced_dashboard_dev
url: https://github.com/dafal/esphome-enhanced-dashboard-addon
arch:
  - amd64
  - aarch64
image: ghcr.io/dafal/{arch}-esphome-enhanced-dashboard-dev

hassio_api: true
auth_api: true
host_network: true
ingress: true
ingress_port: 0
panel_icon: mdi:chip
uart: true

ports:
  6052/tcp: null

map:
  - ssl:ro
  - config:rw

discovery:
  - esphome

schema:
  status_use_ping: bool?
  streamer_mode: bool?
  leave_front_door_open: bool?
  default_compile_process_limit: int(1,)?
  ssl: bool?
  certfile: str?
  keyfile: str?

backup_exclude:
  - '*/*/'

init: false
startup: services
